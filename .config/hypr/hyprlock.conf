background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    color = rgba(36, 39, 58, 1.0)
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(138, 173, 244, 1.0)
    inner_color = rgba(54, 58, 79, 1.0)
    font_color = rgba(202, 211, 245, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M:%S')"
    color = rgba(202, 211, 245, 1.0)
    font_size = 72
    font_family = Fira Sans
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:86400000] echo "$(date '+%A, %d %B %Y')"
    color = rgba(165, 173, 203, 1.0)
    font_size = 18
    font_family = Fira Sans
    position = 0, -20
    halign = center
    valign = center
}
