[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]
env_shell_expand = true

[settings.node]
# compile = true
gpg_verify = false

[tools]
# https://mise-versions.jdx.dev/
"core:node" = "26.1.0"
"npm:pnpm" = "11.1.2"
"aqua:direnv/direnv" = "2.37.1"
"aqua:derailed/k9s" = "0.50.18"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.1"
"aqua:go-task/task" = "3.50.0"
"aqua:jdx/usage" = "3.3.0"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:jqlang/jq" = "1.8.1"
"aqua:minio/mc" = "RELEASE.2025-08-13T08-35-41Z"
"github:openbao/openbao" = "2.5.3"
"aqua:cli/cli" = "2.92.0"
"github:jdx/fnox" = "1.25.0"
opencode = "latest"
fzf = "latest"

[env]
OPENCODE_ENABLE_TELEMETRY = "1"
OPENCODE_OTLP_ENDPOINT = "https://otlp-gateway-prod-us-central-0.grafana.net/otlp"
OPENCODE_OTLP_PROTOCOL = "http/protobuf"
OPENCODE_OTLP_HEADERS_HELPER = "$HOME/.local/bin/grafana-cloud-otlp-header.sh"
OPENCODE_RESOURCE_ATTRIBUTES = "service.name=tyriis"
